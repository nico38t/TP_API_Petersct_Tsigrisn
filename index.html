<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoundSwipe - Mode TikTok</title>
  <link rel="stylesheet" href="static/css/styles.css">
</head>
<body>

<div class="tiktok-app">

  <img id="bg-cover" src="">

  <div class="overlay-gradient"></div>

  <header class="top-bar">
    <div class="genre-list" id="genre-list">
      <button class="genre-pill active">Top</button>
      <button class="genre-pill">Rap</button>
      <button class="genre-pill">Électro</button>
      <button class="genre-pill">Pop</button>
      <button class="genre-pill">Rock</button>
      <button class="genre-pill">R&B</button>
    </div>
  </header>

  <main class="bottom-area">

    <div class="track-info">
      <h1 id="track-title">Instant Crush</h1>
      <h2 id="track-artist">Daft Punk</h2>
      <div class="music-animation">
        <span class="music-note">🎵</span> En cours de lecture...
      </div>



    </div>

    <div class="action-sidebar">
      <button class="action-btn btn-like" id="btn-like">
        <div class="icon-circle">💚</div>
        <span>Favori</span>
      </button>

      <button class="action-btn btn-pass" id="btn-pass">
        <div class="icon-circle">❌</div>
        <span>Passer</span>
      </button>
      <audio
              id="audio-player"
              src="https://cdnt-preview.dzcdn.net/api/1/1/d/6/b/0/d6bc80aadfa1d7625d59a6620f229371.mp3?hdnea=exp=1773408897~acl=/api/1/1/d/6/b/0/d6bc80aadfa1d7625d59a6620f229371.mp3*~data=user_id=0,application_id=42~hmac=92b360521ff79aa304c3b68c7d752a70b4c33f6d7b2e0d2c090eaa571596440d"
              preload="auto">
      </audio>
    </div>

  </main>
</div>


<script src="static/js/main.js"></script>
</body>
</html>
